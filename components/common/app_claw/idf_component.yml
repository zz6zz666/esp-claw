dependencies:
  cap_boards:
    path: ../../claw_capabilities/cap_boards

  cap_files:
    rules:
      - if: $CONFIG{APP_CLAW_CAP_FILES} == True
    path: ../../claw_capabilities/cap_files

  cap_im_attachment:
    rules:
      - if: >-
          $CONFIG{APP_CLAW_CAP_IM_QQ} == True || $CONFIG{APP_CLAW_CAP_IM_FEISHU} == True ||
          $CONFIG{APP_CLAW_CAP_IM_TG} == True || $CONFIG{APP_CLAW_CAP_IM_WECHAT} == True
    path: ../../claw_capabilities/cap_im_attachment

  cap_im_feishu:
    rules:
      - if: $CONFIG{APP_CLAW_CAP_IM_FEISHU} == True
    path: ../../claw_capabilities/cap_im_feishu

  cap_im_qq:
