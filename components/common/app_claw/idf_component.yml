    path: ../../claw_capabilities/cap_im_qq

  cap_im_tg:
    rules:
      - if: $CONFIG{APP_CLAW_CAP_IM_TG} == True
    path: ../../claw_capabilities/cap_im_tg

  cap_im_local:
